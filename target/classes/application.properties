spring.application.name=rickmorty-api

# ==============================
# MongoDB Atlas (cloud) connection
# Set the MONGODB_URI environment variable, e.g.:
# export MONGODB_URI="mongodb+srv://<username>:<password>@<cluster-url>/rickmorty?retryWrites=true&w=majority"
# Never commit real credentials to source control.
# ==============================
spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://<username>:<password>@<cluster-url>/rickmorty?retryWrites=true&w=majority}
spring.data.mongodb.auto-index-creation=true

# ==============================
# JWT config
# ==============================
jwt.secret=${JWT_SECRET:mN0yAUEYhv8MF0w8dEBX74i36CUs5q3tsyi/C8NONjs=}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ==============================
# Server
# ==============================
server.port=${PORT:8080}

# ==============================
# Jackson
# ==============================
spring.jackson.default-property-inclusion=non_null

logging.level.org.springframework.security=INFO
